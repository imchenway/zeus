name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish as a GitHub Release
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-mac:
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:release
      - uses: actions/upload-artifact@v7
        with:
          name: zeus-macos
          path: |
            dist/Zeus-*.dmg
            dist/Zeus-*.zip
            dist/SHA256SUMS
            dist/install.sh
            dist/zeus-release-manifest.json
            dist/homebrew/zeus.rb
      - name: Create GitHub Release from verified local-first artifacts
        if: ${{ inputs.tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" \
            dist/Zeus-*.dmg \
            dist/Zeus-*.zip \
            dist/SHA256SUMS \
            dist/install.sh \
            dist/zeus-release-manifest.json \
            dist/homebrew/zeus.rb \
            --draft \
            --title "Zeus ${{ inputs.tag }}" \
            --notes "Verified by pnpm verify:release. Signing/notarization only reflect configured Apple credentials; do not mark external waits as complete without real secrets."
